; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-espressif]
platform = espressif32
board = esp32-s3-devkitm-1
framework = espidf
build_flags = -D ESP32_ESPRESSIF_BOARD
; Include everything in src/, but exclude the Arduino main file
build_src_filter = 
  +<*> 
  -<main_arduino.cpp>

[env:esp32-s3-arduino]
platform = espressif32
board = esp32-s3-devkitm-1
framework = arduino
build_flags = -D ESP32_ARDUINO_BOARD
; Include everything in src/, but exclude the ESP-IDF main file
build_src_filter = 
  +<*> 
  -<main_espidf.c>
